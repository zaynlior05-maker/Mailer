<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dynamic Template Engine</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #080A1A;
            --panel-bg: #121429;
            --border-color: #1F2340;
            --text-main: #FFFFFF;
            --text-muted: #8E92B2;
            --accent: #8E54E9;
            --accent-glow: #A476F0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            background-color: var(--bg-color);
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }

        .back-btn {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 16px;
            cursor: pointer;
            display: none;
            padding: 8px 16px 8px 0;
        }

        .header-title {
            font-weight: bold;
            font-size: 16px;
            text-align: center;
            flex-grow: 1;
        }
        
        .header-subtitle {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: normal;
        }

        .screen {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            padding-bottom: 100px;
        }
        .screen.active {
            display: block;
        }

        .list-card {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        .list-card:active {
            background-color: #1a1d36;
        }
        .icon-box {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background-color: #1F2340;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            font-size: 20px;
        }
        .list-text { flex-grow: 1; }
        .list-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .list-subtitle { font-size: 13px; color: var(--text-muted); }
        .list-arrow { color: var(--text-muted); font-weight: bold; }

        .form-group {
            margin-bottom: 16px;
        }
        .form-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 6px;
            display: block;
        }
        .form-input {
            width: 100%;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 14px;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 15px;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--accent);
        }
        textarea.form-input {
            resize: vertical;
            min-height: 80px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: bold;
            margin: 24px 0 16px 0;
        }

        .btn-primary {
            width: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-glow));
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-secondary {
            width: 100%;
            background: transparent;
            color: var(--accent-glow);
            border: none;
            padding: 16px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 5px;
        }

        #preview-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.9);
            z-index: 100;
            display: none;
            flex-direction: column;
        }
        .preview-header {
            display: flex;
            justify-content: space-between;
            padding: 16px;
            background-color: var(--bg-color);
            align-items: center;
        }
        .preview-close {
            color: white;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }
        #preview-frame-container {
            flex: 1;
            background: white;
            margin: 16px;
            border-radius: 12px;
            overflow: auto;
            padding: 16px;
            color: black;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background-color: var(--bg-color);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            padding: 12px 0 24px 0;
            z-index: 50;
        }
        .nav-item {
            color: var(--text-muted);
            text-align: center;
            font-size: 10px;
            cursor: pointer;
        }
        .nav-item.active {
            color: var(--accent-glow);
        }
        .nav-icon {
            font-size: 20px;
            margin-bottom: 4px;
            display: block;
        }
        .nav-fab {
            background: linear-gradient(135deg, var(--accent), var(--accent-glow));
            width: 48px;
            height: 48px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -24px;
            box-shadow: 0 4px 15px rgba(142, 84, 233, 0.4);
            color: white;
            font-size: 24px;
        }
    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn" id="back-btn" onclick="goBack()">❮</button>
        <div class="header-title" id="header-title">
            Templates
            <div class="header-subtitle" id="header-subtitle">HTML email library</div>
        </div>
        <div style="width: 40px;"></div>
    </div>

    <!-- Screen 1: Categories -->
    <div id="screen-categories" class="screen active">
        <div class="list-card" onclick="navTo('screen-countries', 'Choose Country', 'Select a country')">
            <div class="icon-box">🏛️</div>
            <div class="list-text">
                <div class="list-title">Bank</div>
                <div class="list-subtitle">Professional banking letters</div>
            </div>
            <div class="list-arrow">›</div>
        </div>
        <div class="list-card">
            <div class="icon-box">₿</div>
            <div class="list-text">
                <div class="list-title">Crypto</div>
                <div class="list-subtitle">Exchanges & crypto wallets</div>
            </div>
            <div class="list-arrow">›</div>
        </div>
    </div>

    <!-- Screen 2: Countries -->
    <div id="screen-countries" class="screen">
        <div class="list-card" onclick="loadBrands('Australia')">
            <div class="icon-box">🇦🇺</div>
            <div class="list-text">
                <div class="list-title">Australia</div>
            </div>
            <div class="list-arrow">›</div>
        </div>
        <div class="list-card" onclick="loadBrands('United Kingdom')">
            <div class="icon-box">🇬🇧</div>
            <div class="list-text">
                <div class="list-title">United Kingdom</div>
            </div>
            <div class="list-arrow">›</div>
        </div>
    </div>

    <!-- Screen 3: Brands (Paginated) -->
    <div id="screen-brands" class="screen">
        <div id="brands-container"></div>
    </div>

    <!-- Screen 4: Templates -->
    <div id="screen-templates" class="screen">
        <div id="templates-container"></div>
    </div>

    <!-- Screen 5: Dynamic Send Setup -->
    <div id="screen-setup" class="screen">
        <div class="list-card" style="cursor: default;">
            <div class="list-text">
                <div class="list-title" id="setup-title">Template Name</div>
                <div class="list-subtitle" id="setup-subtitle">Template send setup</div>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Preset sender ID</label>
            <input type="text" class="form-input" id="conf-sender-id" value="help@brand">
        </div>
        <div class="form-group">
            <label class="form-label">Sender name</label>
            <input type="text" class="form-input" id="conf-sender-name" value="Support Team">
        </div>
        <div class="form-group">
            <label class="form-label">From address</label>
            <input type="text" class="form-input" id="conf-from-address" value="help@brand">
        </div>
        <div class="form-group">
            <label class="form-label">Reply-To address</label>
            <input type="text" class="form-input" id="conf-reply-to" value="no-reply@brand.com">
        </div>
        <div class="form-group">
            <label class="form-label">Subject</label>
            <input type="text" class="form-input" id="conf-subject" value="Important update">
        </div>

        <div class="section-title" id="dynamic-fields-header">Template Parameters</div>
        <div id="dynamic-fields-container"></div>

        <div class="form-group" style="margin-top: 24px;">
            <label class="form-label">Recipient email</label>
            <input type="email" class="form-input" placeholder="recipient@example.com">
        </div>

        <button class="btn-primary" onclick="Telegram.WebApp.showAlert('Email queued for sending!')">Send Email</button>
        <button class="btn-secondary" onclick="openPreview()">Preview Email</button>
    </div>

    <!-- Live Preview Modal -->
    <div id="preview-modal">
        <div class="preview-header">
            <div style="font-weight: bold; font-size: 18px;">Email Preview</div>
            <button class="preview-close" onclick="closePreview()">×</button>
        </div>
        <div id="preview-frame-container"></div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-item">
            <span class="nav-icon">🏠</span> Home
        </div>
        <div class="nav-item active">
            <span class="nav-icon">📄</span> Templates
        </div>
        <div class="nav-fab">
            ✉
        </div>
        <div class="nav-item">
            <span class="nav-icon">🛒</span> Shop
        </div>
        <div class="nav-item">
            <span class="nav-icon">⚙️</span> Account
        </div>
    </div>

            { id: 'nab_2', country: 'Australia', brand: 'NAB', name: 'NAB — Blank Text', desc: 'Standard custom body layout', sender_id: 'help@nab', sender_name: 'NAB Support', from: 'help@nab', reply: 'no-reply@nab.com.au', subject: 'NAB Update', html: `<div style="font-family: Arial; max-width: 500px; margin: 0 auto;"><h2 style="color:#E31837;">nab</h2><p>{{body_text}}</p></div>` },

            { id: 'ing_1', country: 'Australia', brand: 'ING', name: 'ING — Security Alert', desc: 'Urgent security message', sender_id: 'security@ing', sender_name: 'ING Security', from: 'security@ing', reply: 'no-reply@ing.com.au', subject: 'Important Security Update', html: `<div style="font-family: Arial; max-width: 500px; margin: 0 auto;"><div style="background:#FF6200; padding:15px; color:white;">ING</div><p>New device {{device_name}} near {{location}}.</p></div>` },
            { id: 'ing_2', country: 'Australia', brand: 'ING', name: 'ING — Blank Text', desc: 'Customizable ING template', sender_id: 'contact@ing', sender_name: 'ING Contact', from: 'contact@ing', reply: 'no-reply@ing.com.au', subject: 'Message from ING', html: `<div style="font-family: Arial; max-width: 500px; margin: 0 auto;"><div style="background:#FF6200; padding:15px; color:white;">ING</div><p>{{body_text}}</p></div>` }
        ];

        let navigationStack = ['screen-categories'];
        let activeTemplate = null;

        // PAGINATION VARIABLES
        let currentCountry = '';
        let currentBrandPage = 1;
        const brandsPerPage = 8;

        function navTo(screenId, title, subtitle) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            
            document.getElementById('header-title').innerText = title;
            document.getElementById('header-subtitle').innerText = subtitle || '';
            document.getElementById('back-btn').style.display = 'block';
            
            if (navigationStack[navigationStack.length - 1] !== screenId) {
                navigationStack.push(screenId);
            }
        }

        function goBack() {
            if (navigationStack.length > 1) {
                navigationStack.pop();
                const previousScreen = navigationStack[navigationStack.length - 1];
                
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById(previousScreen).classList.add('active');

                if(previousScreen === 'screen-categories') {
                    document.getElementById('header-title').innerText = 'Templates';
                    document.getElementById('header-subtitle').innerText = 'HTML email library';
                    document.getElementById('back-btn').style.display = 'none';
                }
            }
        }

        // ==========================================
        // PAGINATION ENGINE
        // ==========================================
        function loadBrands(country, page = 1) {
            currentCountry = country;
            currentBrandPage = page;
            
            const allBrands = [...new Set(templateDB.filter(t => t.country === country).map(t => t.brand))].sort();
            const totalPages = Math.ceil(allBrands.length / brandsPerPage);
            
            if (currentBrandPage < 1) currentBrandPage = 1;
            if (currentBrandPage > totalPages) currentBrandPage = totalPages;

            const startIndex = (currentBrandPage - 1) * brandsPerPage;
            const brandsToRender = allBrands.slice(startIndex, startIndex + brandsPerPage);

            const container = document.getElementById('brands-container');
            container.innerHTML = '';

            if(allBrands.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding: 20px; color: #8E92B2;">No brands found for ${country}</div>`;
            } else {
                brandsToRender.forEach(brand => {
                    const count = templateDB.filter(t => t.brand === brand).length;
                    container.innerHTML += `
                        <div class="list-card" onclick="loadTemplates('${brand}')">
                            <div class="icon-box">🏛️</div>
                            <div class="list-text">
                                <div class="list-title">${brand}</div>
                                <div class="list-subtitle">${count} preset template(s)</div>
                            </div>
                            <div class="list-arrow">›</div>
                        </div>
                    `;
                });
                
                // Render Pagination Controls if needed
                if (totalPages > 1) {
                    container.innerHTML += `
                        <div style="display: flex; justify-content: space-between; align-items: center; padding: 16px 0; margin-bottom: 20px;">
                            <button onclick="loadBrands('${country}', ${currentBrandPage - 1})" 
                                class="btn-secondary" 
                                style="width:auto; margin:0; padding:10px 20px; background:#1F2340; color:white; border-radius:10px; visibility: ${currentBrandPage === 1 ? 'hidden' : 'visible'};">Back</button>
                                
                            <span style="color:var(--text-main); font-size:16px;">Page ${currentBrandPage} of ${totalPages}</span>
                            
                            <button onclick="loadBrands('${country}', ${currentBrandPage + 1})" 
                                class="btn-secondary" 
                                style="width:auto; margin:0; padding:10px 20px; background:#1F2340; color:white; border-radius:10px; visibility: ${currentBrandPage === totalPages ? 'hidden' : 'visible'};">Next</button>
                        </div>
                    `;
                }
            }
            
            // Adjust header to show total brands (not just the page count)
            navTo('screen-brands', country, `${allBrands.length} brands`);
        }

        function loadTemplates(brand) {
            const templates = templateDB.filter(t => t.brand === brand);
            const container = document.getElementById('templates-container');
            container.innerHTML = '';

            templates.forEach(t => {
                container.innerHTML += `
                    <div class="list-card" onclick="setupTemplate('${t.id}')">
                        <div class="list-text">
                            <div class="list-title">${t.name}</div>
                            <div class="list-subtitle">${t.desc}</div>
                        </div>
                        <div class="list-arrow">›</div>
                    </div>
                `;
            });
            navTo('screen-templates', brand, 'Select a template');
        }

        function setupTemplate(templateId) {
            activeTemplate = templateDB.find(t => t.id === templateId);
            
            document.getElementById('setup-title').innerText = activeTemplate.name;
            document.getElementById('setup-subtitle').innerText = activeTemplate.desc;
            document.getElementById('conf-sender-id').value = activeTemplate.sender_id;
            document.getElementById('conf-sender-name').value = activeTemplate.sender_name;
            document.getElementById('conf-from-address').value = activeTemplate.from;
            document.getElementById('conf-reply-to').value = activeTemplate.reply;
            document.getElementById('conf-subject').value = activeTemplate.subject || 'Important update';

            const regex = /{{(.*?)}}/g;
            let match;
            const variables = new Set();
            while ((match = regex.exec(activeTemplate.html)) !== null) {
                variables.add(match[1]);
            }

            const varArray = Array.from(variables);
            const container = document.getElementById('dynamic-fields-container');
            container.innerHTML = '';
            
            document.getElementById('dynamic-fields-header').innerText = `Template Parameters (${varArray.length} detected)`;

            varArray.forEach(v => {
                const labelName = v.split('_').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
                
                const inputHtml = v.includes('body') ? 
                    `<textarea class="form-input dynamic-input" data-var="${v}" placeholder="Enter ${labelName.toLowerCase()}"></textarea>` :
                    `<input type="text" class="form-input dynamic-input" data-var="${v}" placeholder="Enter ${labelName.toLowerCase()}">`;

                container.innerHTML += `
                    <div class="form-group">
                        <label class="form-label">${labelName}</label>
                        ${inputHtml}
                    </div>
                `;
            });

            document.querySelectorAll('.dynamic-input').forEach(input => {
                input.addEventListener('input', renderLivePreview);
            });

            navTo('screen-setup', activeTemplate.name, 'Fill the preview details');
        }

        function renderLivePreview() {
            if(!activeTemplate) return;
            
            let htmlCompiled = activeTemplate.html;
            
            document.querySelectorAll('.dynamic-input').forEach(input => {
                const varName = input.getAttribute('data-var');
                const val = input.value || `{{${varName}}}`;
                htmlCompiled = htmlCompiled.split(`{{${varName}}}`).join(val); 
            });

            document.getElementById('preview-frame-container').innerHTML = htmlCompiled;
        }

        function openPreview() {
            renderLivePreview();
            document.getElementById('preview-modal').style.display = 'flex';
        }

        function closePreview() {
            document.getElementById('preview-modal').style.display = 'none';
        }
        {% endraw %}
    </script>
</body>
