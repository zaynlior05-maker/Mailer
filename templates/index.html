<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dynamic Template Engine</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root{--bg-color:#080A1A;--panel-bg:#121429;--border-color:#1F2340;--text-main:#FFFFFF;--text-muted:#8E92B2;--accent:#8E54E9;--accent-glow:#A476F0}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background-color:var(--bg-color);color:var(--text-main);margin:0;padding:0;display:flex;flex-direction:column;height:100vh;overflow:hidden}
        .header{display:flex;align-items:center;justify-content:space-between;padding:16px;background-color:var(--bg-color);border-bottom:1px solid var(--border-color);z-index:10}
        .back-btn{background:transparent;border:none;color:var(--text-main);font-size:16px;cursor:pointer;display:none;padding:8px 16px 8px 0}
        .header-title{font-weight:bold;font-size:16px;text-align:center;flex-grow:1}
        .header-subtitle{font-size:12px;color:var(--text-muted);font-weight:normal}
        .screen{display:none;flex:1;overflow-y:auto;padding:16px;padding-bottom:100px}
        .screen.active{display:block}
        .list-card{background-color:var(--panel-bg);border:1px solid var(--border-color);border-radius:16px;padding:16px;margin-bottom:12px;display:flex;align-items:center;cursor:pointer;transition:background 0.2s}
        .list-card:active{background-color:#1a1d36}
        .icon-box{width:40px;height:40px;border-radius:10px;background-color:#1F2340;display:flex;align-items:center;justify-content:center;margin-right:16px;font-size:20px}
        .list-text{flex-grow:1}
        .list-title{font-size:16px;font-weight:600;margin-bottom:4px}
        .list-subtitle{font-size:13px;color:var(--text-muted)}
        .list-arrow{color:var(--text-muted);font-weight:bold}
        .form-group{margin-bottom:16px}
        .form-label{font-size:13px;color:var(--text-muted);margin-bottom:6px;display:block}
        .form-input{width:100%;background-color:var(--panel-bg);border:1px solid var(--border-color);color:var(--text-main);padding:14px;border-radius:12px;box-sizing:border-box;font-size:15px}
        .form-input:focus{outline:none;border-color:var(--accent)}
        textarea.form-input{resize:vertical;min-height:80px}
        .section-title{font-size:16px;font-weight:bold;margin:24px 0 16px 0}
        .btn-primary{width:100%;background:linear-gradient(90deg,var(--accent),var(--accent-glow));color:white;border:none;padding:16px;border-radius:14px;font-size:16px;font-weight:bold;cursor:pointer;margin-top:10px}
        .btn-secondary{width:100%;background:transparent;color:var(--accent-glow);border:none;padding:16px;font-size:14px;cursor:pointer;margin-top:5px}
        #preview-modal{position:fixed;top:0;left:0;right:0;bottom:0;background-color:rgba(0,0,0,0.9);z-index:100;display:none;flex-direction:column}
        .preview-header{display:flex;justify-content:space-between;padding:16px;background-color:var(--bg-color);align-items:center}
        .preview-close{color:white;background:none;border:none;font-size:24px;cursor:pointer}
        #preview-frame-container{flex:1;background:white;margin:16px;border-radius:12px;overflow:auto;padding:16px;color:black}
        .bottom-nav{position:fixed;bottom:0;width:100%;background-color:var(--bg-color);border-top:1px solid var(--border-color);display:flex;justify-content:space-around;padding:12px 0 24px 0;z-index:50}
        .nav-item{color:var(--text-muted);text-align:center;font-size:10px;cursor:pointer}
        .nav-item.active{color:var(--accent-glow)}
        .nav-icon{font-size:20px;margin-bottom:4px;display:block}
        .nav-fab{background:linear-gradient(135deg,var(--accent),var(--accent-glow));width:48px;height:48px;border-radius:16px;display:flex;align-items:center;justify-content:center;margin-top:-24px;box-shadow:0 4px 15px rgba(142,84,233,0.4);color:white;font-size:24px}
    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn" id="back-btn" onclick="goBack()">❮</button>
        <div class="header-title" id="header-title">Templates<div class="header-subtitle" id="header-subtitle">HTML email library</div></div>
        <div style="width: 40px;"></div>
    </div>

    <!-- Screen 1: Categories -->
    <div id="screen-categories" class="screen active">
        <div class="list-card" onclick="navTo('screen-countries', 'Choose Country', 'Select a country')"><div class="icon-box">🏛️</div><div class="list-text"><div class="list-title">Bank</div><div class="list-subtitle">Professional banking letters</div></div><div class="list-arrow">›</div></div>
        <div class="list-card"><div class="icon-box">₿</div><div class="list-text"><div class="list-title">Crypto</div><div class="list-subtitle">Exchanges & crypto wallets</div></div><div class="list-arrow">›</div></div>
    </div>

    <!-- Screen 2: Countries -->
    <div id="screen-countries" class="screen">
        <div class="list-card" onclick="loadBrands('Australia')"><div class="icon-box">🇦🇺</div><div class="list-text"><div class="list-title">Australia</div></div><div class="list-arrow">›</div></div>
        <div class="list-card" onclick="loadBrands('United Kingdom')"><div class="icon-box">🇬🇧</div><div class="list-text"><div class="list-title">United Kingdom</div></div><div class="list-arrow">›</div></div>
    </div>

    <!-- Screen 3: Brands -->
    <div id="screen-brands" class="screen"><div id="brands-container"></div></div>
    <!-- Screen 4: Templates -->
    <div id="screen-templates" class="screen"><div id="templates-container"></div></div>

    <!-- Screen 5: Setup -->
    <div id="screen-setup" class="screen">
        <div class="list-card" style="cursor: default;"><div class="list-text"><div class="list-title" id="setup-title">Template Name</div><div class="list-subtitle" id="setup-subtitle">Template send setup</div></div></div>
        <div class="form-group"><label class="form-label">Preset sender ID</label><input type="text" class="form-input" id="conf-sender-id" value="help@brand"></div>
        <div class="form-group"><label class="form-label">Sender name</label><input type="text" class="form-input" id="conf-sender-name" value="Support Team"></div>
        <div class="form-group"><label class="form-label">From address</label><input type="text" class="form-input" id="conf-from-address" value="help@brand"></div>
        <div class="form-group"><label class="form-label">Reply-To address</label><input type="text" class="form-input" id="conf-reply-to" value="no-reply@brand.com"></div>
        <div class="form-group"><label class="form-label">Subject</label><input type="text" class="form-input" id="conf-subject" value="Important update"></div>
        <div class="section-title" id="dynamic-fields-header">Template Parameters</div><div id="dynamic-fields-container"></div>
        <div class="form-group" style="margin-top: 24px;"><label class="form-label">Recipient email</label><input type="email" class="form-input" placeholder="recipient@example.com"></div>
        <button class="btn-primary" onclick="Telegram.WebApp.showAlert('Email queued for sending!')">Send Email</button>
        <button class="btn-secondary" onclick="openPreview()">Preview Email</button>
    </div>

    <!-- Modal -->
    <div id="preview-modal">
        <div class="preview-header"><div style="font-weight: bold; font-size: 18px;">Email Preview</div><button class="preview-close" onclick="closePreview()">×</button></div>
        <div id="preview-frame-container"></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item"><span class="nav-icon">🏠</span> Home</div>
        <div class="nav-item active"><span class="nav-icon">📄</span> Templates</div>
        <div class="nav-fab">✉</div>
        <div class="nav-item"><span class="nav-icon">🛒</span> Shop</div>
        <div class="nav-item"><span class="nav-icon">⚙️</span> Account</div>
    </div>

    <script>
        {% raw %}
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        // Helper string generators for repeating 2-template brands perfectly
        const buildVerify = (color, logoHtml) => `<div style="font-family: Arial, sans-serif; max-width: 500px; margin: 0 auto; border: 1px solid #eaeaea; border-radius: 8px; overflow: hidden;"><div style="background-color: ${color}; padding: 20px; color: white;">${logoHtml}</div><div style="padding: 20px;"><h3 style="color: #333; margin-top: 0;">Identity Verification</h3><p style="color: #555;">Dear {{recipient_name}},</p><p style="color: #555;">A representative is currently assisting you. Please confirm the following details match those provided by your representative:</p><div style="background: #f9f9f9; padding: 15px; border-radius: 6px; margin: 20px 0;"><div style="margin-bottom: 10px;"><span style="color: #888; font-size: 12px; text-transform: uppercase;">Representative Name</span><br><strong style="font-size: 16px; color: #333;">{{advisor_name}}</strong></div><div><span style="color: #888; font-size: 12px; text-transform: uppercase;">Reference Number</span><br><strong style="font-size: 16px; color: #333;">{{case_reference}}</strong></div></div><div style="background: #e8f5e9; color: #2e7d32; padding: 12px; border-radius: 6px; font-weight: bold; font-size: 14px;">✓ You are currently connected to a verified member of staff</div><p style="color: #555; margin-top: 20px;">Kind regards,<br><strong>Customer Services Team</strong></p></div></div>`;
        const buildAuth = (color, logoHtml) => `<div style="font-family: Arial, sans-serif; max-width: 500px; margin: 0 auto; border: 1px solid #eaeaea; border-radius: 8px; overflow: hidden;"><div style="background-color: ${color}; padding: 20px; color: white;">${logoHtml}</div><div style="padding: 20px;"><h3 style="color: ${color}; margin-top: 0;">Transaction Authorisation Alert</h3><p style="color: #555;">Dear {{recipient_name}},</p><p style="color: #555;">Your advisor will shortly direct you to complete a manual cancellation or order replication to prevent the transaction on your card ending in <b>{{card_last4}}</b>.</p><div style="border: 1px solid #eaeaea; border-radius: 6px; margin: 20px 0;"><div style="padding: 12px; border-bottom: 1px solid #eaeaea;"><span style="color: #888; font-size: 11px; text-transform: uppercase;">Merchant</span><br><strong style="color: #333;">{{merchant}}</strong></div><div style="padding: 12px; border-bottom: 1px solid #eaeaea;"><span style="color: #888; font-size: 11px; text-transform: uppercase;">Attempted Transaction</span><br><strong style="color: #333;">{{attempted_transaction}}</strong></div><div style="padding: 12px;"><span style="color: ${color}; font-size: 11px; text-transform: uppercase; font-weight: bold;">Transaction Reference</span><br><strong style="color: ${color};">{{transaction_reference}}</strong></div></div><div style="background: #fff8e1; color: #8d6e63; padding: 12px; border-radius: 6px; font-size: 13px;"><strong>Security Notice:</strong> Never share your transaction reference with unsolicited callers. Our advisors will always have access to this information and will never ask you to transfer funds.</div><p style="color: #555; margin-top: 20px;">Kind regards,<br><strong>Support Team</strong></p></div></div>`;
        const buildNewAccount = (color, logoHtml) => `<div style="font-family: Arial, sans-serif; max-width: 500px; margin: 0 auto; border: 1px solid #eaeaea; border-radius: 8px; overflow: hidden;"><div style="background-color: #fff; padding: 20px; border-bottom: 1px solid #eaeaea; display: flex; justify-content: space-between; align-items: center;">${logoHtml}<span style="color: #888; font-size: 12px;">{{date}}</span></div><div style="padding: 20px;"><h2 style="color: #333; font-weight: normal; margin-top: 0;">Your Account is Ready</h2><p style="color: #555; font-size: 14px; line-height: 1.5;">Great news! Your new account has been successfully created. Your account details are listed below. Please save this information for your records.</p><p style="color: #555; font-size: 14px; line-height: 1.5;">Keep your account details secure. Do not share your account number or sort code with anyone you do not trust. We will never ask for these details via email.</p><div style="background: #fafafa; border: 1px solid #eaeaea; border-radius: 12px; padding: 20px; margin: 24px 0;"><div style="display: flex; justify-content: space-between; margin-bottom: 16px;"><strong style="color: #333;">Account Holder</strong><span style="color: #333;">{{recipient_name}}</span></div><div style="display: flex; justify-content: space-between; margin-bottom: 16px;"><strong style="color: #333;">Sort Code</strong><span style="color: #333;">{{sort_code}}</span></div><div style="display: flex; justify-content: space-between;"><strong style="color: #333;">Account Number</strong><span style="color: #333;">{{account_number}}</span></div></div></div><div style="background-color: #f5f5f5; padding: 20px; text-align: center; font-size: 10px; color: #888;">This is an automated message. Please do not reply to this email. For support, contact customer service.</div></div>`;

        const wiseLogo = `<svg width="80" viewBox="0 0 100 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M18.8 0L0 0L6.4 12.8L2.4 12.8L12.8 24L11.2 16L15.2 16L18.8 0Z" fill="#9FE870"/><text x="25" y="19" font-family="sans-serif" font-weight="900" font-size="24" fill="#163300" letter-spacing="-1">wise</text></svg>`;
        const virginLogo = `<span style="color:#E10A14; font-weight:900; font-family:sans-serif; letter-spacing:-1px; font-size:24px;">VIRGIN <span style="font-weight:300;">MONEY</span> UK</span>`;
        const santanderLogo = `<span style="color:#fff; font-weight:900; font-family:sans-serif; font-size:24px;">Santander</span>`;
        const tsbLogo = `<span style="color:#fff; font-weight:900; font-family:sans-serif; font-size:26px;">TSB</span>`;

        const templateDB = [
            
            // =========================================================
            // ==================== UNITED KINGDOM =====================
            // =========================================================
            
            // 6 WISE TEMPLATES (Matching exact screenshots)
            { id: 'wise_1', country: 'United Kingdom', brand: 'Wise', name: 'Wise Employee Verify', desc: 'Global template for Wise', sender_id: 'security@wise.com', sender_name: 'Wise Security', from: 'security@wise.com', reply: 'no-reply@wise.com', subject: 'Staff member Verification', html: `<div style="font-family: Arial, sans-serif; max-width: 500px; margin: 0 auto; color: #333; padding: 20px; border: 1px solid #eaeaea; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);"><div style="margin-bottom: 20px;">${wiseLogo}</div><h3 style="color: #163300; font-size: 20px;">Staff member Verification</h3><p style="font-size: 14px; color: #4A5C40; line-height: 1.5;">You are receiving this email because a Wise employee has initiated contact with you regarding your account. For your security, please verify the employee details below before sharing any account information.</p><div style="margin: 20px 0; font-size: 14px;"><div style="display: flex; justify-content: space-between; margin-bottom: 12px;"><span style="color: #666;">Employee Name:</span> <strong style="color: #163300;">{{employee_name}}</strong></div><div style="display: flex; justify-content: space-between; margin-bottom: 12px;"><span style="color: #666;">Case Reference:</span> <strong style="color: #163300;">{{case_id}}</strong></div><div style="display: flex; justify-content: space-between; margin-bottom: 12px;"><span style="color: #666;">Department:</span> <strong style="color: #163300;">Customer Support</strong></div><div style="display: flex; justify-content: space-between; margin-bottom: 12px;"><span style="color: #666;">Authentication Status:</span> <strong style="color: #2E8B57;">Verified Employee</strong></div></div><p style="font-size: 13px; color: #4A5C40; line-height: 1.5;">This verification confirms that the person contacting you is an authorised Wise employee. You may proceed with your conversation knowing their identity has been confirmed.</p><p style="font-size: 13px; color: #4A5C40; line-height: 1.5;">If you have any concerns about this communication, please contact us directly through the Wise app or at wise.com.</p><div style="background-color: #F2F5F7; padding: 15px; text-align: center; font-size: 11px; color: #4A5C40; border-radius: 8px; margin-top: 20px;">Wise Payments Limited is authorised by the Financial Conduct Authority.<br><br>© 2026 Wise. All rights reserved.</div></div>` },
            { id: 'wise_2', country: 'United Kingdom', brand: 'Wise', name: 'Wise Verify', desc: 'Global template for Wise', sender_id: 'support@wise.com', sender_name: 'Wise', from: 'support@wise.com', reply: 'no-reply@wise.com', subject: 'Representative Confirmation', html: `<div style="font-family: Arial, sans-serif; max-width: 500px; margin: 0 auto; padding: 20px; border: 1px solid #eaeaea; border-radius: 12px;"><div style="margin-bottom: 20px; border-bottom: 1px solid #eaeaea; padding-bottom: 15px;"><div style="font-size: 12px; font-weight: bold; margin-bottom: 8px;">Your account matters to us</div><div style="font-size: 11px; color: #666; display: flex; align-items: center;"><span style="color:#9FE870; font-size: 16px; margin-right: 5px;">✔</span> We'll always include your name, {{recipient_name}}, and your email {{recipient_email}}, so you know our emails are genuine.</div></div><div style="margin-bottom: 24px;">${wiseLogo}</div><h2 style="color: #163300; font-size: 22px; margin-top: 0;">Representative Confirmation</h2><p style="color: #333; font-size: 14px;">Dear {{recipient_name}},</p><p style="color: #333; font-size: 14px; line-height: 1.5;">A representative is currently assisting you. Please confirm the following details match those provided by your representative:</p><div style="background: #F2F5F7; border-radius: 8px; padding: 20px; display: flex; justify-content: space-around; margin: 24px 0;"><div style="text-align: center;"><div style="font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 8px;">Representative Name</div><div style="font-size: 16px; font-weight: bold; color: #163300;">{{advisor_name}}</div></div><div style="text-align: center;"><div style="font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 8px;">Reference</div><div style="font-size: 16px; font-weight: bold; color: #163300;">{{case_reference}}</div></div></div><div style="background: #E8F5E9; border-radius: 8px; padding: 15px; display: flex; align-items: center; color: #163300; font-weight: bold; font-size: 13px;"><div style="background: #163300; color: #9FE870; width: 24px; height: 24px; border-radius: 4px; display: flex; align-items: center; justify-content: center; margin-right: 12px;">🛡</div> You are currently connected to a member of staff</div><p style="color: #333; font-size: 14px; margin-top: 24px;">Kind regards,<br><strong>Customer Services Team</strong></p><hr style="border-top: 3px solid #9FE870; border-bottom: 0; margin: 30px 0;"><div style="text-align: center; margin-bottom: 20px;">${wiseLogo}</div><div style="text-align: center; font-size: 9px; color: #888; line-height: 1.5;">© 2026 All rights reserved.<br>This email was sent to {{recipient_email}}<br>If you have any questions, please contact our support team.<br>6th Floor, The Tea Building, 56 Shoreditch High Street, London E1 6JJ. Authorised by the Financial Conduct Authority.</div></div>` },
            { id: 'wise_3', country: 'United Kingdom', brand: 'Wise', name: 'Wise In-app Auth and payment link', desc: 'Wise transaction authorization alert', sender_id: 'alerts@wise.com', sender_name: 'Wise Security', from: 'alerts@wise.com', reply: 'no-reply@wise.com', subject: 'Transaction Authorisation Alert', html: `<div style="font-family: Arial, sans-serif; max-width: 500px; margin: 0 auto; padding: 20px; border: 1px solid #eaeaea; border-radius: 12px;"><div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #9FE870; padding-bottom: 15px; margin-bottom: 20px;">${wiseLogo}<span style="font-size: 11px; color: #888;">{{date}}</span></div><h2 style="color: #9FE870; font-size: 22px; margin-top: 0; text-shadow: 1px 1px 1px rgba(0,0,0,0.1);">Transaction Authorisation Alert</h2><p style="color: #333; font-size: 14px;">Dear {{recipient_name}},</p><p style="color: #333; font-size: 14px; line-height: 1.5;">Your advisor will shortly direct you to complete a manual cancellation or order replication to prevent the transaction on your card ending in <b>{{card_last4}}</b>.</p><div style="border: 1px solid #eaeaea; border-radius: 8px; margin: 24px 0; overflow: hidden;"><div style="background: #fafafa; padding: 10px 15px; font-size: 10px; font-weight: bold; color: #9FE870; text-transform: uppercase;">Transaction Details</div><div style="padding: 15px; border-bottom: 1px solid #eaeaea; display: flex; align-items: center;"><div style="font-size: 16px; margin-right: 15px; color: #163300;">💳</div><div><div style="font-size: 11px; color: #888; font-weight: bold; text-transform: uppercase;">Merchant</div><div style="font-size: 15px; font-weight: bold; color: #163300;">{{merchant}}</div></div></div><div style="padding: 15px; border-bottom: 1px solid #eaeaea; display: flex; align-items: center;"><div style="font-size: 16px; margin-right: 15px; color: #163300;">🕒</div><div><div style="font-size: 11px; color: #888; font-weight: bold; text         let navigationStack = ['screen-categories'];
        let activeTemplate = null;

        let currentCountry = '';
        let currentBrandPage = 1;
        const brandsPerPage = 8;

        function navTo(screenId, title, subtitle) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            document.getElementById('header-title').innerText = title;
            document.getElementById('header-subtitle').innerText = subtitle || '';
            document.getElementById('back-btn').style.display = 'block';
            if (navigationStack[navigationStack.length - 1] !== screenId) navigationStack.push(screenId);
        }

        function goBack() {
            if (navigationStack.length > 1) {
                navigationStack.pop();
                const previousScreen = navigationStack[navigationStack.length - 1];
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById(previousScreen).classList.add('active');
                if(previousScreen === 'screen-categories') {
                    document.getElementById('header-title').innerText = 'Templates';
                    document.getElementById('header-subtitle').innerText = 'HTML email library';
                    document.getElementById('back-btn').style.display = 'none';
                }
            }
        }

        function loadBrands(country, page = 1) {
            currentCountry = country;
            currentBrandPage = page;
            const allBrands = [...new Set(templateDB.filter(t => t.country === country).map(t => t.brand))].sort();
            const totalPages = Math.ceil(allBrands.length / brandsPerPage);
            if (currentBrandPage < 1) currentBrandPage = 1;
            if (currentBrandPage > totalPages) currentBrandPage = totalPages;
            const startIndex = (currentBrandPage - 1) * brandsPerPage;
            const brandsToRender = allBrands.slice(startIndex, startIndex + brandsPerPage);
            const container = document.getElementById('brands-container');
            container.innerHTML = '';
            if(allBrands.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding: 20px; color: #8E92B2;">No brands found for ${country}</div>`;
            } else {
                brandsToRender.forEach(brand => {
                    const count = templateDB.filter(t => t.brand === brand).length;
                    container.innerHTML += `<div class="list-card" onclick="loadTemplates('${brand}')"><div class="icon-box">🏛️</div><div class="list-text"><div class="list-title">${brand}</div><div class="list-subtitle">${count} preset templates</div></div><div class="list-arrow">›</div></div>`;
                });
                if (totalPages > 1) {
                    container.innerHTML += `<div style="display: flex; justify-content: space-between; align-items: center; padding: 16px 0; margin-bottom: 20px;"><button onclick="loadBrands('${country}', ${currentBrandPage - 1})" class="btn-secondary" style="width:auto; margin:0; padding:10px 20px; background:#1F2340; color:white; border-radius:10px; visibility: ${currentBrandPage === 1 ? 'hidden' : 'visible'};">Back</button><span style="color:var(--text-main); font-size:16px;">Page ${currentBrandPage} of ${totalPages}</span><button onclick="loadBrands('${country}', ${currentBrandPage + 1})" class="btn-secondary" style="width:auto; margin:0; padding:10px 20px; background:#1F2340; color:white; border-radius:10px; visibility: ${currentBrandPage === totalPages ? 'hidden' : 'visible'};">Next</button></div>`;
                }
            }
            navTo('screen-brands', country, `${allBrands.length} brands`);
        }

        function loadTemplates(brand) {
            const templates = templateDB.filter(t => t.brand === brand);
            const container = document.getElementById('templates-container');
            container.innerHTML = '';
            container.innerHTML += `<div class="list-card" style="margin-bottom: 20px;"><div class="list-text"><div class="list-title" style="color:var(--text-main); text-align:center;">Upload a template</div><div class="list-subtitle" style="text-align:center;">Active membership required</div></div><div class="list-arrow">›</div></div>`;
            templates.forEach(t => {
                container.innerHTML += `<div class="list-card" onclick="setupTemplate('${t.id}')"><div class="icon-box">🏛️</div><div class="list-text"><div class="list-title">${t.name}</div><div class="list-subtitle">${t.desc}</div></div><div class="list-arrow">›</div></div>`;
            });
            navTo('screen-templates', `${brand} Templates`, `Showing ${templates.length} templates`);
        }

        function setupTemplate(templateId) {
            activeTemplate = templateDB.find(t => t.id === templateId);
            document.getElementById('setup-title').innerText = activeTemplate.name;
            document.getElementById('setup-subtitle').innerText = activeTemplate.desc;
            document.getElementById('conf-sender-id').value = activeTemplate.sender_id;
            document.getElementById('conf-sender-name').value = activeTemplate.sender_name;
            document.getElementById('conf-from-address').value = activeTemplate.from;
            document.getElementById('conf-reply-to').value = activeTemplate.reply;
            document.getElementById('conf-subject').value = activeTemplate.subject || 'Important update';
            const regex = /{{(.*?)}}/g;
            let match;
            const variables = new Set();
            while ((match = regex.exec(activeTemplate.html)) !== null) {
                variables.add(match[1]);
            }
            const varArray = Array.from(variables);
            const container = document.getElementById('dynamic-fields-container');
            container.innerHTML = '';
            document.getElementById('dynamic-fields-header').innerText = `Template Parameters (${varArray.length} detected)`;
            varArray.forEach(v => {
                const labelName = v.split('_').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
                const isDate = v.toLowerCase() === 'date';
                const inputHtml = v.includes('body') ? `<textarea class="form-input dynamic-input" data-var="${v}" placeholder="Enter ${labelName.toLowerCase()}"></textarea>` : `<input type="text" class="form-input dynamic-input" data-var="${v}" placeholder="Enter ${labelName.toLowerCase()}" ${isDate ? 'value="July 13, 2026"' : ''}>`;
                container.innerHTML += `<div class="form-group"><label class="form-label">${labelName}</label>${inputHtml}</div>`;
            });
            document.querySelectorAll('.dynamic-input').forEach(input => {
                input.addEventListener('input', renderLivePreview);
            });
            navTo('screen-setup', activeTemplate.name, 'Fill the preview details');
        }

        function renderLivePreview() {
            if(!activeTemplate) return;
            let htmlCompiled = activeTemplate.html;
            document.querySelectorAll('.dynamic-input').forEach(input => {
                const varName = input.getAttribute('data-var');
                const val = input.value || `{{${varName}}}`;
                htmlCompiled = htmlCompiled.split(`{{${varName}}}`).join(val); 
            });
            document.getElementById('preview-frame-container').innerHTML = htmlCompiled;
        }

        function openPreview() {
            renderLivePreview();
            document.getElementById('preview-modal').style.display = 'flex';
        }

        function closePreview() {
            document.getElementById('preview-modal').style.display = 'none';
        }
        {% endraw %}
    </script>
