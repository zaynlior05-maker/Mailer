<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Emailer Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0b0c0e;
            color: #ffffff;
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .user-info h3 {
            margin: 0;
            color: #4cd964;
        }
        .user-info p {
            margin: 4px 0 0 0;
            font-size: 14px;
            color: #8e8e93;
        }
        .balance-box {
            text-align: right;
        }
        .balance-amount {
            font-size: 24px;
            font-weight: bold;
        }
        .topup-btn {
            background-color: #1abc9c;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            cursor: pointer;
        }
        .welcome-card {
            background: linear-gradient(135deg, #16222f 0%, #0f171e 100%);
            border: 1px solid #1f2d3d;
            border-radius: 16px;
            padding: 16px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 16px;
        }
        .main-action-btn {
            background-color: #4cd964;
            color: #000000;
            font-weight: bold;
            font-size: 18px;
            border: none;
            border-radius: 16px;
            padding: 20px;
            width: 100%;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            margin-bottom: 16px;
        }
        .alert-card {
            background-color: #1c1c1e;
            border: 1px solid #2c2c2e;
            border-radius: 16px;
            padding: 16px;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .upgrade-btn {
            background-color: #ffcc00;
            color: #000000;
            font-weight: bold;
            border: none;
            padding: 10px 16px;
            border-radius: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="user-info">
            <h3 id="username">Loading...</h3>
            <p style="color: #ff3b30;">No Membership ❌</p>
        </div>
        <div class="balance-box">
            <div style="font-size: 12px; color: #8e8e93;">0 Mail Tokens</div>
            <div class="balance-amount">$0.00</div>
            <button class="topup-btn">+ Top Up</button>
        </div>
    </div>

    <div class="welcome-card">
        <div style="color: #4cd964; font-weight: bold; margin-bottom: 4px;">📩 EXCEL MAILER</div>
        <div style="font-size: 18px; font-weight: bold; margin-bottom: 8px;">Welcome to Excel Emailer</div>
        <div style="font-size: 14px; color: #8e8e93;">The reliable tool for callers with no downtime.</div>
    </div>

    <button class="main-action-btn" onclick="sendAction()">
        <div>
            <div>Send an email</div>
            <div style="font-size: 12px; font-weight: normal; opacity: 0.8; margin-top: 4px;">Choose sender & template</div>
        </div>
        <div>➔</div>
    </button>

    <div class="alert-card">
        <div>
            <div style="color: #ffcc00; font-weight: bold;">Your trial has expired</div>
            <div style="font-size: 13px; color: #8e8e93; margin-top: 4px;">Click here to upgrade</div>
        </div>
        <button class="upgrade-btn">Upgrade ★</button>
    </div>

    <script>
        // Tell Telegram to expand the Mini App to full height
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        // Get live user data directly from Telegram interface safely
        const initDataUnsafe = window.Telegram.WebApp.initDataUnsafe;
        if (initDataUnsafe && initDataUnsafe.user) {
            document.getElementById('username').innerText = "@" + (initDataUnsafe.user.username || initDataUnsafe.user.first_name);
        } else {
            document.getElementById('username').innerText = "@GuestUser";
        }

        // Simple function to send alerts when buttons are pressed
        function sendAction() {
            window.Telegram.WebApp.showAlert("Email functionality template clicked!");
        }
    </script>
</body>
</html>
