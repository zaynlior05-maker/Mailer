<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dynamic Template Engine</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #080A1A;
            --panel-bg: #121429;
            --border-color: #1F2340;
            --text-main: #FFFFFF;
            --text-muted: #8E92B2;
            --accent: #8E54E9;
            --accent-glow: #A476F0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            background-color: var(--bg-color);
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }

        .back-btn {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 16px;
            cursor: pointer;
            display: none;
            padding: 8px 16px 8px 0;
        }

        .header-title {
            font-weight: bold;
            font-size: 16px;
            text-align: center;
            flex-grow: 1;
        }
        
        .header-subtitle {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: normal;
        }

        .screen {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            padding-bottom: 100px;
        }
        .screen.active {
            display: block;
        }

        .list-card {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        .list-card:active {
            background-color: #1a1d36;
        }
        .icon-box {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background-color: #1F2340;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            font-size: 20px;
        }
        .list-text { flex-grow: 1; }
        .list-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .list-subtitle { font-size: 13px; color: var(--text-muted); }
        .list-arrow { color: var(--text-muted); font-weight: bold; }

        .form-group {
            margin-bottom: 16px;
        }
        .form-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 6px;
            display: block;
        }
        .form-input {
            width: 100%;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 14px;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 15px;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--accent);
        }
        textarea.form-input {
            resize: vertical;
            min-height: 80px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: bold;
            margin: 24px 0 16px 0;
        }

        .btn-primary {
            width: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-glow));
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-secondary {
            width: 100%;
            background: transparent;
            color: var(--accent-glow);
            border: none;
            padding: 16px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 5px;
        }

        #preview-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.9);
            z-index: 100;
            display: none;
            flex-direction: column;
        }
        .preview-header {
            display: flex;
            justify-content: space-between;
            padding: 16px;
            background-color: var(--bg-color);
            align-items: center;
        }
        .preview-close {
            color: white;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }
        #preview-frame-container {
            flex: 1;
            background: white;
            margin: 16px;
            border-radius: 12px;
            overflow: auto;
            padding: 16px;
            color: black;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background-color: var(--bg-color);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            padding: 12px 0 24px 0;
            z-index: 50;
        }
        .nav-item {
            color: var(--text-muted);
            text-align: center;
            font-size: 10px;
            cursor: pointer;
        }
        .nav-item.active {
            color: var(--accent-glow);
        }
        .nav-icon {
            font-size: 20px;
            margin-bottom: 4px;
            display: block;
        }
        .nav-fab {
            background: linear-gradient(135deg, var(--accent), var(--accent-glow));
            width: 48px;
            height: 48px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -24px;
            box-shadow: 0 4px 15px rgba(142, 84, 233, 0.4);
            color: white;
            font-size: 24px;
        }
    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn" id="back-btn" onclick="goBack()">❮</button>
        <div class="header-title" id="header-title">
            Templates
            <div class="header-subtitle" id="header-subtitle">HTML email library</div>
        </div>
        <div style="width: 40px;"></div>
    </div>

    <!-- Screen 1: Categories -->
    <div id="screen-categories" class="screen active">
        <div class="list-card" onclick="navTo('screen-countries', 'Choose Country', 'Select a country')">
            <div class="icon-box">🏛️</div>
            <div class="list-text">
                <div class="list-title">Bank</div>
                <div class="list-subtitle">Professional banking letters</div>
            </div>
            <div class="list-arrow">›</div>
        </div>
        <div class="list-card">
            <div class="icon-box">₿</div>
            <div class="list-text">
                <div class="list-title">Crypto</div>
                <div class="list-subtitle">Exchanges & crypto wallets</div>
            </div>
            <div class="list-arrow">›</div>
        </div>
    </div>

    <!-- Screen 2: Countries -->
    <div id="screen-countries" class="screen">
        <div class="list-card" onclick="loadBrands('Australia')">
            <div class="icon-box">🇦🇺</div>
            <div class="list-text">
                <div class="list-title">Australia</div>
            </div>
            <div class="list-arrow">›</div>
        </div>
        <div class="list-card" onclick="loadBrands('United Kingdom')">
            <div class="icon-box">🇬🇧</div>
            <div class="list-text">
                <div class="list-title">United Kingdom</div>
            </div>
            <div class="list-arrow">›</div>
        </div>
    </div>

    <!-- Screen 3: Brands -->
    <div id="screen-brands" class="screen">
        <div id="brands-container"></div>
    </div>

    <!-- Screen 4: Templates -->
    <div id="screen-templates" class="screen">
        <div id="templates-container"></div>
    </div>

    <!-- Screen 5: Dynamic Send Setup -->
    <div id="screen-setup" class="screen">
        <div class="list-card" style="cursor: default;">
            <div class="list-text">
                <div class="list-title" id="setup-title">Template Name</div>
                <div class="list-subtitle" id="setup-subtitle">Template send setup</div>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Preset sender ID</label>
            <input type="text" class="form-input" id="conf-sender-id" value="help@brand">
        </div>
        <div class="form-group">
            <label class="form-label">Sender name</label>
            <input type="text" class="form-input" id="conf-sender-name" value="Support Team">
        </div>
        <div class="form-group">
            <label class="form-label">From address</label>
            <input type="text" class="form-input" id="conf-from-address" value="help@brand">
        </div>
        <div class="form-group">
            <label class="form-label">Reply-To address</label>
            <input type="text" class="form-input" id="conf-reply-to" value="no-reply@brand.com">
        </div>
        <div class="form-group">
            <label class="form-label">Subject</label>
            <input type="text" class="form-input" id="conf-subject" value="Important update">
        </div>

        <div class="section-title" id="dynamic-fields-header">Template Parameters</div>
        <div id="dynamic-fields-container"></div>

        <div class="form-group" style="margin-top: 24px;">
            <label class="form-label">Recipient email</label>
            <input type="email" class="form-input" placeholder="recipient@example.com">
        </div>

        <button class="btn-primary" onclick="Telegram.WebApp.showAlert('Email queued for sending!')">Send Email</button>
        <button class="btn-secondary" onclick="openPreview()">Preview Email</button>
    </div>

    <!-- Live Preview Modal -->
    <div id="preview-modal">
        <div class="preview-header">
            <div style="font-weight: bold; font-size: 18px;">Email Preview</div>
            <button class="preview-close" onclick="closePreview()">×</button>
        </div>
        <div id="preview-frame-container"></div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-item">
            <span class="nav-icon">🏠</span> Home
        </div>
        <div class="nav-item active">
            <span class="nav-icon">📄</span> Templates
        </div>
        <div class="nav-fab">
            ✉
        </div>
        <div class="nav-item">
            <span class="nav-icon">🛒</span> Shop
        </div>
        <div class="nav-item">
            <span class="nav-icon">⚙️</span> Account
        </div>
    </div>

    <script>
        {% raw %}
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        const templateDB = [
            // ================= 1. ANZ =================
            {
                id: 'anz_1', country: 'Australia', brand: 'ANZ', name: 'ANZ Employee Verify', desc: 'ANZ template send setup',
                sender_id: 'help@anz', sender_name: 'Support Team', from: 'help@anz', reply: 'no-reply@anz.com', subject: 'Important update from anz',
                html: `
                    <div style="font-family: Arial, sans-serif; max-width: 500px; margin: 0 auto; color: #333; padding: 10px;">
                        <div style="border-bottom: 1px solid #eaeaea; padding-bottom: 10px; margin-bottom: 30px;">
                            <span style="color: #004165; font-size: 24px; font-weight: bold; letter-spacing: 1px;">ANZ</span>
                        </div>
                        <h3 style="color: #004165;">Employee Verification</h3>
                        <p style="font-size: 14px; color: #333;">You are receiving this email because you have requested verification of an ANZ employee who is assisting you.</p>
                        
                        <div style="background-color: #f5f5f5; border-radius: 6px; padding: 16px; margin: 20px 0;">
                            <div style="margin-bottom: 12px;">
                                <span style="font-size: 12px; color: #888;">Employee Name</span><br>
                                <strong style="font-size: 15px;">{{employee_name}}</strong>
                            </div>
                            <div>
                                <span style="font-size: 12px; color: #888;">Reference Number</span><br>
                                <strong style="font-size: 15px;">{{case_id}}</strong>
                            </div>
                        </div>

                        <p style="font-size: 13px; color: #333; margin-bottom: 30px; line-height: 1.5;">This confirms that the person named above is a verified employee of Australia and New Zealand Banking Group Limited and is authorised to assist you with your enquiry.</p>
                        
                        <div style="background-color: #f5f5f5; padding: 20px; text-align: center; font-size: 12px; color: #888;">
                            © 2026 Australia and New Zealand Banking Group Limited ABN 11 005 357 522<br><br>
                            This is an automated message from ANZ Security.
                        </div>
                    </div>
                `
            },
            {
                id: 'anz_2', country: 'Australia', brand: 'ANZ', name: 'Transaction Authorization Alert', desc: 'In-app Auth and payment link',
                sender_id: 'help@anz', sender_name: 'ANZ Support Team', from: 'help@anz', reply: 'no-reply@anz.com', subject: 'Transaction Authorization Alert',
                html: `
                    <div style="font-family: Arial, sans-serif; max-width: 500px; margin: 0 auto; color: #004165;">
                        <div style="border-bottom: 2px solid #004165; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: baseline;">
                            <h2 style="margin: 0; color: #004165; font-size: 28px;">ANZ</h2>
                            <span style="font-size: 12px; color: #666;">{{date}}</span>
                        </div>
                        <h2 style="color: #004165;">Transaction Authorization Alert</h2>
                        <p>Dear {{recipient_name}},</p>
                        <p>Your advisor will shortly direct you to complete a manual cancellation or order replication to prevent the transaction on your card ending in <b>{{card_last4}}</b>.</p>
                        
                        <div style="background-color: #f5f7f9; border-radius: 8px; padding: 16px; margin: 20px 0;">
                            <p style="font-size: 11px; font-weight: bold; color: #004165; margin-top:0;">TRANSACTION DETAILS</p>
                            <div style="margin-bottom: 12px;">
                                <span style="font-size: 12px; color: #666;">MERCHANT</span><br>
                                <strong>{{merchant}}</strong>
                            </div>
                            <div style="margin-bottom: 12px;">
                                <span style="font-size: 12px; color: #666;">ATTEMPTED TRANSACTION</span><br>
                                <strong>{{attempted_transaction}}</strong>
                            </div>
                            <div>
                                <span style="font-size: 12px; color: #004165; font-weight:bold;">TRANSACTION REFERENCE</span><br>
                                <strong style="color: #004165;">{{transaction_reference}}</strong>
                            </div>
                        </div>
                        <div style="background-color: #fff9e6; border-left: 4px solid #004165; padding: 12px; font-size: 13px;">
                            <strong>Security Notice:</strong> Never share your transaction reference with unsolicited callers.
                        </div>
                        <p style="margin-top: 30px; font-size: 14px;">Kind Regards,<br><strong>ANZ Support Team</strong></p>
                    </div>
                `
            },

            // ================= 2. BARCLAYS =================
            {
                id: 'barclays_1', country: 'Australia', brand: 'Barclays', name: 'Barclays — Blank Text', desc: 'Standard custom body layout',
                sender_id: 'help@barclays', sender_name: 'Support Team', from: 'help@barclays', reply: 'no-reply@barclays.com.au', subject: 'Account Update',
                html: `
                    <div style="font-family: Arial, sans-serif; max-width: 500px; margin: 0 auto; color: #333;">
                        <h3 style="margin-bottom: 5px;">Your account matters to us</h3>
                        <p style="font-size: 12px; color: #666; margin-top: 0;">We'll always include your name, {{recipient_name}}, and your email, so you know our emails are genuine.</p>
                        <div style="background-color: #00AEEF; height: 60px; margin-bottom: 20px; display: flex; align-items: center; padding-left: 20px; color: white; font-weight: bold; font-size: 24px; letter-spacing: 2px;">
                            BARCLAYS
                        </div>
                        <p>Dear {{recipient_name}},</p>
                        <p style="line-height: 1.6;">{{body_text}}</p>
                        <p>Kind regards,<br><strong>Barclays Customer Service</strong></p>
                        <hr style="border: 0; border-top: 2px solid #00AEEF; margin: 30px 0;">
                        <p style="text-align: center; font-size: 11px; color: #999;">barclays.com.au | Contact us</p>
                    </div>
                `
            },
            {
                id: 'barclays_2', country: 'Australia', brand: 'Barclays', name: 'Barclays — Security Alert', desc: 'Urgent account notification',
                sender_id: 'security@barclays', sender_name: 'Security Team', from: 'security@barclays', reply: 'no-reply@barclays.com.au', subject: 'Urgent Security Alert',
                html: `
                    <div style="font-family: Arial, sans-serif; max-width: 500px; margin: 0 auto; color: #333;">
                        <div style="background-color: #00AEEF; height: 60px; margin-bottom: 20px; display: flex; align-items: center; padding-left: 20px; color: white; font-weight: bold; font-size: 24px; letter-spacing: 2px;">
                            BARCLAYS
                        </div>
                        <h2 style="color: #D52B1E;">Security Alert: Action Required</h2>
                        <p>Dear {{recipient_name}},</p>
                        <p>We recently detected unusual activity on your account ending in <b>{{account_ending}}</b>.</p>
                        <p>For your protection, we have temporarily restricted access until we can verify this activity with you.</p>
                        <div style="background-color: #f2f2f2; padding: 15px; margin: 20px 0; border-left: 4px solid #D52B1E;">
                            <strong>Reference Number:</strong> {{reference_number}}<br>
                            <strong>Date of Alert:</strong> {{date}}
                        </div>
                        <p>Please contact our Security Team immediately at <b>{{support_number}}</b> and quote your reference number.</p>
                        <p>Yours sincerely,<br><strong>Barclays Fraud Prevention</strong></p>
                    </div>
                `
            },

            // ================= 3. ASB =================
            {
                id: 'asb_1', country: 'Australia', brand: 'ASB', name: 'ASB — Account Notice', desc: 'General account information',
                sender_id: 'info@asb', sender_name: 'ASB Info', from: 'info@asb', reply: 'no-reply@asb.co.nz', subject: 'Important Account Notice',
                html: `
                    <div style="font-family: Arial, sans-serif; max-width: 500px; margin: 0 auto; color: #333;">
                        <div style="background-color: #FFB600; padding: 20px; text-align: left;">
                            <span style="color: #000000; font-weight: 900; font-size: 32px; letter-spacing: -1px;">ASB</span>
                        </div>
                        <h2 style="margin-top: 30px;">Account Update</h2>
                        <p>Hi {{recipient_name}},</p>
                        <p style="line-height: 1.5;">{{body_text}}</p>
                        <p>Thanks,<br><strong>The ASB Team</strong></p>
                        <hr style="border: 0; border-top: 1px solid #ccc; margin: 30px 0;">
                        <p style="font-size: 11px; color: #777;">ASB Bank Limited. This email is intended for {{recipient_email}}.</p>
                    </div>
                `
            },
            {
                id: 'asb_2', country: 'Australia', brand: 'ASB', name: 'ASB — Payment Confirmation', desc: 'Transaction alert layout',
                sender_id: 'payments@asb', sender_name: 'ASB Payments', from: 'payments@asb', reply: 'no-reply@asb.co.nz', subject: 'Payment Confirmation',
                html: `
                    <div style="font-family: Arial, sans-serif; max-width: 500px; margin: 0 auto; color: #333;">
                        <div style="background-color: #FFB600; padding: 20px; text-align: left;">
                            <span style="color: #000000; font-weight: 900; font-size: 32px; letter-spacing: -1px;">ASB</span>
                        </div>
                        <h2 style="margin-top: 30px;">Payment Processed successfully</h2>
                        <p>Hi {{recipient_name}},</p>
                        <p>Your payment to <b>{{payee_name}}</b> has been processed from your account ending in <b>{{account_ending}}</b>.</p>
                        
                        <table style="width: 100%; border-collapse: collapse; margin: 20px 0;">
                            <tr style="border-bottom: 1px solid #ddd;">
                                <td style="padding: 10px 0; color: #666;">Amount</td>
                                <td style="padding: 10px 0; text-align: right; font-weight: bold;">{{amount}}</td>
                            </tr>
                            <tr style="border-bottom: 1px solid #ddd;">
                                <td style="padding: 10px 0; color: #666;">Date</td>
                                <td style="padding: 10px 0; text-align: right; font-weight: bold;">{{date}}</td>
                            </tr>
                            <tr style="border-bottom: 1px solid #ddd;">
                                <td style="padding: 10px 0; color: #666;">Reference</td>
                                <td style="padding: 10px 0; text-align: right; font-weight: bold;">{{reference_code}}</td>
                            </tr>
                        </table>
                        <p>If you did not authorize this payment, please call us on <b>0800 803 804</b> immediately.</p>
                        <p>Thanks,<br><strong>The ASB Team</strong></p>
                    </div>
                `
            },

            // ================= 4. BNZ =================
            {
                id: 'bnz_1', country: 'Australia', brand: 'BNZ', name: 'BNZ — Blank Text', desc: 'Customizable body email',
                sender_id: 'support@bnz', sender_name: 'BNZ Support', from: 'support@bnz', reply: 'no-reply@bnz.co.nz', subject: 'Message from BNZ',
                html: `
                    <div style="font-family: 'Open Sans', Arial, sans-serif; max-width: 500px; margin: 0 auto; color: #00194A;">
                        <div style="padding: 20px 0; border-bottom: 2px solid #00194A; text-align: left;">
                            <span style="font-weight: 900; font-size: 36px; color: #00194A; letter-spacing: -2px;">bnz</span>
                        </div>
                        <h2 style="font-weight: normal;">Important Notice</h2>
                        <p>Dear {{recipient_name}},</p>
                        <p style="line-height: 1.6;">{{body_text}}</p>
                        <br>
                        <p>Regards,<br><strong>Bank of New Zealand</strong></p>
                        <div style="background-color: #f7f7f7; padding: 15px; font-size: 11px; margin-top: 30px; color: #666;">
                            This email was sent to {{recipient_email}}.<br>Bank of New Zealand (BNZ)
                        </div>
                    </div>
                `
            },
            {
                id: 'bnz_2', country: 'Australia', brand: 'BNZ', name: 'BNZ — Verification', desc: 'Verification alert setup',
                sender_id: 'verify@bnz', sender_name: 'BNZ Verification', from: 'verify@bnz', reply: 'no-reply@bnz.co.nz', subject: 'Identity Verification Required',
                html: `
                    <div style="font-family: 'Open Sans', Arial, sans-serif; max-width: 500px; margin: 0 auto; color: #00194A;">
                        <div style="padding: 20px 0; border-bottom: 2px solid #00194A; text-align: left;">
                            <span style="font-weight: 900; font-size: 36px; color: #00194A; letter-spacing: -2px;">bnz</span>
                        </div>
                        <h2 style="font-weight: normal; color: #C8102E;">Action Required: Verify your identity</h2>
                        <p>Dear {{recipient_name}},</p>
                        <p>We are updating our security systems to ensure your banking remains safe.</p>
                        <p>We require you to confirm the contact details associated with your account ending in <b>{{account_last_4}}</b> by <b>{{deadline_date}}</b>.</p>
                        
                        <div style="text-align: center; margin: 30px 0;">
                            <a href="#" style="background-color: #00194A; color: white; padding: 14px 28px; text-decoration: none; font-weight: bold; border-radius: 4px;">Verify Identity Now</a>
                        </div>
                        
                        <p>If you fail to verify your identity by this date, your digital banking access may be temporarily suspended.</p>
                        <p>Regards,<br><strong>BNZ Security Team</strong></p>
                    </div>
                `
            },

            // ================= 5. COMMONWEALTH =================
            {
                id: 'comm_1', country: 'Australia', brand: 'Commonwealth', name: 'CommBank — Security Alert', desc: 'Security hold notification',
                sender_id: 'security@commbank', sender_name: 'CommBank Security', from: 'security@commbank', reply: 'no-reply@commbank.com.au', subject: 'Security Hold',
                html: `
                    <div style="font-family: Arial, sans-serif; max-width: 500px; margin: 0 auto; color: #333;">

        let navigationStack = ['screen-categories'];
        let activeTemplate = null;

        function navTo(screenId, title, subtitle) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            
            document.getElementById('header-title').innerText = title;
            document.getElementById('header-subtitle').innerText = subtitle || '';
            document.getElementById('back-btn').style.display = 'block';
            
            navigationStack.push(screenId);
        }

        function goBack() {
            if (navigationStack.length > 1) {
                navigationStack.pop();
                const previousScreen = navigationStack[navigationStack.length - 1];
                
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById(previousScreen).classList.add('active');

                if(previousScreen === 'screen-categories') {
                    document.getElementById('header-title').innerText = 'Templates';
                    document.getElementById('header-subtitle').innerText = 'HTML email library';
                    document.getElementById('back-btn').style.display = 'none';
                }
            }
        }

        function loadBrands(country) {
            const brands = [...new Set(templateDB.filter(t => t.country === country).map(t => t.brand))];
            const container = document.getElementById('brands-container');
            container.innerHTML = '';

            if(brands.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding: 20px; color: #8E92B2;">No brands found for ${country}</div>`;
            } else {
                brands.forEach(brand => {
                    const count = templateDB.filter(t => t.brand === brand).length;
                    container.innerHTML += `
                        <div class="list-card" onclick="loadTemplates('${brand}')">
                            <div class="icon-box">🏛️</div>
                            <div class="list-text">
                                <div class="list-title">${brand}</div>
                                <div class="list-subtitle">${count} preset template(s)</div>
                            </div>
                            <div class="list-arrow">›</div>
                        </div>
                    `;
                });
            }
            navTo('screen-brands', country, `${brands.length} brands`);
        }

        function loadTemplates(brand) {
            const templates = templateDB.filter(t => t.brand === brand);
            const container = document.getElementById('templates-container');
            container.innerHTML = '';

            templates.forEach(t => {
                container.innerHTML += `
                    <div class="list-card" onclick="setupTemplate('${t.id}')">
                        <div class="list-text">
                            <div class="list-title">${t.name}</div>
                            <div class="list-subtitle">${t.desc}</div>
                        </div>
                        <div class="list-arrow">›</div>
                    </div>
                `;
            });
            navTo('screen-templates', brand, 'Select a template');
        }

        function setupTemplate(templateId) {
            activeTemplate = templateDB.find(t => t.id === templateId);
            
            document.getElementById('setup-title').innerText = activeTemplate.name;
            document.getElementById('setup-subtitle').innerText = activeTemplate.desc;
            document.getElementById('conf-sender-id').value = activeTemplate.sender_id;
            document.getElementById('conf-sender-name').value = activeTemplate.sender_name;
            document.getElementById('conf-from-address').value = activeTemplate.from;
            document.getElementById('conf-reply-to').value = activeTemplate.reply;
            document.getElementById('conf-subject').value = activeTemplate.subject || 'Important update';

            const regex = /{{(.*?)}}/g;
            let match;
            const variables = new Set();
            while ((match = regex.exec(activeTemplate.html)) !== null) {
                variables.add(match[1]);
            }

            const varArray = Array.from(variables);
            const container = document.getElementById('dynamic-fields-container');
            container.innerHTML = '';
            
            document.getElementById('dynamic-fields-header').innerText = `Template Parameters (${varArray.length} detected)`;

            varArray.forEach(v => {
                const labelName = v.split('_').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
                
                const inputHtml = v.includes('body') ? 
                    `<textarea class="form-input dynamic-input" data-var="${v}" placeholder="Enter ${labelName.toLowerCase()}"></textarea>` :
                    `<input type="text" class="form-input dynamic-input" data-var="${v}" placeholder="Enter ${labelName.toLowerCase()}">`;

                container.innerHTML += `
                    <div class="form-group">
                        <label class="form-label">${labelName}</label>
                        ${inputHtml}
                    </div>
                `;
            });

            document.querySelectorAll('.dynamic-input').forEach(input => {
                input.addEventListener('input', renderLivePreview);
            });

            navTo('screen-setup', activeTemplate.name, 'Fill the preview details');
        }

        function renderLivePreview() {
            if(!activeTemplate) return;
            
            let htmlCompiled = activeTemplate.html;
            
            document.querySelectorAll('.dynamic-input').forEach(input => {
                const varName = input.getAttribute('data-var');
                const val = input.value || `{{${varName}}}`;
                htmlCompiled = htmlCompiled.split(`{{${varName}}}`).join(val); 
            });

            document.getElementById('preview-frame-container').innerHTML = htmlCompiled;
        }

        function openPreview() {
            renderLivePreview();
            document.getElementById('preview-modal').style.display = 'flex';
        }

        function closePreview() {
            document.getElementById('preview-modal').style.display = 'none';
        }
        {% endraw %}
    </script>
